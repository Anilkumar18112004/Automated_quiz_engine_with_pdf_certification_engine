<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizMaster Pro – Automated Quiz Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c14;
    --surface: #12151f;
    --card: #181c2a;
    --border: #252a3d;
    --gold: #f5c842;
    --gold2: #e8a020;
    --accent: #5b8dee;
    --green: #3ecf8e;
    --red: #f06292;
    --text: #e8ecf5;
    --muted: #8892aa;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID BACKGROUND ─── */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: 
      linear-gradient(rgba(91,141,238,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,141,238,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; }

  /* ─── HEADER ─── */
  header {
    text-align:center;
    padding: 48px 24px 32px;
    background: linear-gradient(180deg, rgba(91,141,238,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .logo-badge {
    display:inline-flex; align-items:center; gap:10px;
    background: rgba(245,200,66,0.12);
    border: 1px solid rgba(245,200,66,0.3);
    border-radius:999px; padding: 6px 18px;
    font-size:13px; color:var(--gold); font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    margin-bottom:20px;
  }
  .logo-badge span { font-size:16px; }
  h1 {
    font-family:'Playfair Display', serif;
    font-size: clamp(2rem,5vw,3.5rem);
    font-weight:900;
    background: linear-gradient(135deg, #fff 30%, var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    line-height:1.1; margin-bottom:12px;
  }
  header p {
    color:var(--muted); font-size:16px; max-width:480px; margin:0 auto;
  }

  /* ─── SCREENS ─── */
  .screen { display:none; max-width:760px; margin:0 auto; padding:40px 20px 60px; }
  .screen.active { display:block; }

  /* ─── WELCOME SCREEN ─── */
  .topic-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:14px; margin:32px 0;
  }
  .topic-card {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:var(--radius);
    padding:22px 18px;
    cursor:pointer;
    transition: all 0.2s;
    text-align:center;
  }
  .topic-card:hover { border-color:var(--accent); background:rgba(91,141,238,0.08); transform:translateY(-2px); }
  .topic-card.selected { border-color:var(--gold); background:rgba(245,200,66,0.08); }
  .topic-card .icon { font-size:36px; margin-bottom:10px; }
  .topic-card .label { font-weight:600; font-size:15px; }
  .topic-card .count { color:var(--muted); font-size:13px; margin-top:4px; }

  .config-row {
    display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:24px 0;
  }
  .config-box {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:18px;
  }
  .config-box label { font-size:13px; color:var(--muted); display:block; margin-bottom:8px; font-weight:500; }
  .config-box select, .config-box input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); padding:10px 14px; border-radius:10px;
    font-family:inherit; font-size:15px;
  }
  .config-box input { font-size:15px; }
  input[type="text"]:focus, select:focus { outline:2px solid var(--accent); outline-offset:2px; }

  /* ─── BUTTONS ─── */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 32px; border-radius:12px; border:none;
    font-family:inherit; font-size:16px; font-weight:600;
    cursor:pointer; transition:all 0.2s; text-decoration:none;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color:#1a1200;
  }
  .btn-gold:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(245,200,66,0.35); }
  .btn-outline {
    background:transparent; border:2px solid var(--border);
    color:var(--text);
  }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-green {
    background:linear-gradient(135deg,#3ecf8e,#1db36b);
    color:#001a0e;
  }
  .btn-green:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(62,207,142,0.3); }
  .btn-full { width:100%; }

  /* ─── QUIZ SCREEN ─── */
  .quiz-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:24px; flex-wrap:wrap; gap:12px;
  }
  .quiz-meta { font-size:14px; color:var(--muted); }
  .quiz-meta strong { color:var(--text); }

  .timer-badge {
    background:var(--card); border:1px solid var(--border);
    border-radius:999px; padding:8px 20px;
    font-size:18px; font-weight:700;
    font-family:'Playfair Display',serif;
    color:var(--gold); letter-spacing:1px;
    transition: color 0.3s;
  }
  .timer-badge.urgent { color:var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* progress bar */
  .progress-bar {
    height:6px; background:var(--border); border-radius:99px;
    margin-bottom:28px; overflow:hidden;
  }
  .progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg, var(--accent), var(--gold));
    transition:width 0.4s ease;
  }

  .question-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:32px;
    margin-bottom:20px;
  }
  .q-num { font-size:13px; color:var(--muted); font-weight:500; margin-bottom:10px; }
  .q-text { font-size:20px; font-weight:600; line-height:1.5; }

  .options-list { display:flex; flex-direction:column; gap:12px; margin-top:28px; }
  .option-btn {
    background:var(--surface); border:2px solid var(--border);
    border-radius:12px; padding:16px 20px;
    text-align:left; cursor:pointer;
    font-family:inherit; font-size:16px; color:var(--text);
    transition:all 0.18s; display:flex; align-items:center; gap:14px;
  }
  .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(91,141,238,0.08); }
  .option-btn.correct { border-color:var(--green); background:rgba(62,207,142,0.1); color:var(--green); }
  .option-btn.wrong { border-color:var(--red); background:rgba(240,98,146,0.1); color:var(--red); }
  .option-btn.reveal { border-color:var(--green); background:rgba(62,207,142,0.06); }
  .option-btn:disabled { cursor:default; }
  .opt-letter {
    width:30px; height:30px; border-radius:8px;
    background:var(--border); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; flex-shrink:0;
    transition:background 0.2s;
  }
  .option-btn.correct .opt-letter { background:var(--green); color:#001a0e; }
  .option-btn.wrong .opt-letter { background:var(--red); color:#fff; }

  .feedback-bar {
    border-radius:12px; padding:14px 20px;
    margin-top:16px; font-weight:500; font-size:15px;
    display:none; align-items:center; gap:10px;
  }
  .feedback-bar.show { display:flex; }
  .feedback-bar.correct { background:rgba(62,207,142,0.12); border:1px solid rgba(62,207,142,0.3); color:var(--green); }
  .feedback-bar.wrong { background:rgba(240,98,146,0.1); border:1px solid rgba(240,98,146,0.3); color:var(--red); }

  .nav-row { display:flex; justify-content:flex-end; margin-top:20px; }

  /* ─── RESULT SCREEN ─── */
  .result-hero {
    text-align:center; padding:40px 20px;
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); margin-bottom:28px;
    position:relative; overflow:hidden;
  }
  .result-hero::before {
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.1) 0%, transparent 70%);
    pointer-events:none;
  }
  .score-ring {
    width:140px; height:140px; border-radius:50%;
    border:6px solid var(--border); margin:0 auto 24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative;
  }
  .score-pct {
    font-family:'Playfair Display',serif;
    font-size:40px; font-weight:900; line-height:1;
  }
  .score-label { font-size:13px; color:var(--muted); margin-top:4px; }
  .grade-badge {
    display:inline-block; padding:6px 20px; border-radius:999px;
    font-weight:700; font-size:14px; margin-bottom:16px;
  }
  .grade-A { background:rgba(62,207,142,0.15); color:var(--green); border:1px solid rgba(62,207,142,0.4); }
  .grade-B { background:rgba(91,141,238,0.15); color:var(--accent); border:1px solid rgba(91,141,238,0.4); }
  .grade-C { background:rgba(245,200,66,0.15); color:var(--gold); border:1px solid rgba(245,200,66,0.4); }
  .grade-F { background:rgba(240,98,146,0.12); color:var(--red); border:1px solid rgba(240,98,146,0.4); }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
  .stat-box {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:20px; text-align:center;
  }
  .stat-val { font-size:28px; font-weight:700; font-family:'Playfair Display',serif; }
  .stat-lbl { font-size:13px; color:var(--muted); margin-top:4px; }

  .review-list { display:flex; flex-direction:column; gap:14px; margin-bottom:28px; }
  .review-item {
    background:var(--card); border-left:4px solid var(--border);
    border-radius:0 12px 12px 0; padding:18px 20px;
  }
  .review-item.correct-r { border-left-color:var(--green); }
  .review-item.wrong-r { border-left-color:var(--red); }
  .review-q { font-weight:600; font-size:15px; margin-bottom:8px; }
  .review-answer { font-size:14px; color:var(--muted); }
  .review-answer em { font-style:normal; font-weight:600; }
  .review-answer .ok { color:var(--green); }
  .review-answer .bad { color:var(--red); }

  .action-row { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }

  /* ─── NAME INPUT SCREEN ─── */
  .name-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:40px 32px; text-align:center;
  }
  .name-card h2 { font-family:'Playfair Display',serif; font-size:2rem; margin-bottom:8px; }
  .name-card p { color:var(--muted); margin-bottom:28px; }
  .name-input {
    width:100%; background:var(--surface); border:2px solid var(--border);
    color:var(--text); padding:14px 18px; border-radius:12px;
    font-family:inherit; font-size:18px; text-align:center;
    margin-bottom:20px; transition:border-color 0.2s;
  }
  .name-input:focus { outline:none; border-color:var(--gold); }

  /* ─── SECTION HEADING ─── */
  .section-title {
    font-family:'Playfair Display',serif; font-size:1.4rem;
    margin-bottom:20px; padding-bottom:12px;
    border-bottom:1px solid var(--border);
  }

  /* ─── TOAST ─── */
  #toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    background:#fff; color:#111; padding:12px 24px; border-radius:999px;
    font-weight:600; font-size:14px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
    z-index:1000; opacity:0; transition:opacity 0.3s;
    pointer-events:none;
  }
  #toast.show { opacity:1; }

  @media(max-width:520px){
    .config-row { grid-template-columns:1fr; }
    .stats-row { grid-template-columns:1fr 1fr; }
    .question-card { padding:20px; }
    .q-text { font-size:17px; }
  }
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="logo-badge"><span>🏆</span> QuizMaster Pro</div>
  <h1>Automated Quiz Engine</h1>
  <p>Test your knowledge, earn a personalized PDF certificate</p>
</header>

<!-- ══════════════ SCREEN 1: WELCOME ══════════════ -->
<div id="screen-welcome" class="screen active">
  <h2 class="section-title" style="margin-top:8px">Choose a Topic</h2>
  <div class="topic-grid" id="topicGrid"></div>

  <div class="config-row">
    <div class="config-box">
      <label>Number of Questions</label>
      <select id="numQ">
        <option value="5">5 Questions</option>
        <option value="10" selected>10 Questions</option>
        <option value="15">15 Questions</option>
        <option value="20">20 Questions</option>
      </select>
    </div>
    <div class="config-box">
      <label>Time per Question</label>
      <select id="timePerQ">
        <option value="0">No Limit</option>
        <option value="20">20 seconds</option>
        <option value="30" selected>30 seconds</option>
        <option value="60">60 seconds</option>
      </select>
    </div>
  </div>

  <button class="btn btn-gold btn-full" onclick="startQuiz()">
    🚀 Start Quiz
  </button>
</div>

<!-- ══════════════ SCREEN 2: NAME ENTRY ══════════════ -->
<div id="screen-name" class="screen">
  <div class="name-card">
    <div style="font-size:56px;margin-bottom:16px">📝</div>
    <h2>Enter Your Name</h2>
    <p>Your name will appear on the certificate</p>
    <input class="name-input" id="userName" type="text" placeholder="Full Name" maxlength="60" />
    <button class="btn btn-gold btn-full" onclick="beginQuiz()">Begin Quiz →</button>
  </div>
</div>

<!-- ══════════════ SCREEN 3: QUIZ ══════════════ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-meta">
      Topic: <strong id="qTopic"></strong> &nbsp;|&nbsp;
      Question <strong id="qNum"></strong> of <strong id="qTotal"></strong>
    </div>
    <div class="timer-badge" id="timerBadge" style="display:none">⏱ <span id="timerVal">30</span>s</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="question-card">
    <div class="q-num" id="qNumLabel"></div>
    <div class="q-text" id="qText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="feedback-bar" id="feedbackBar"></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-gold" id="nextBtn" onclick="nextQuestion()" style="display:none">
      Next →
    </button>
  </div>
</div>

<!-- ══════════════ SCREEN 4: RESULT ══════════════ -->
<div id="screen-result" class="screen">
  <div class="result-hero">
    <div class="score-ring" id="scoreRing">
      <div class="score-pct" id="scorePct"></div>
      <div class="score-label">Score</div>
    </div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2 id="resultMsg" style="font-family:'Playfair Display',serif; font-size:1.6rem; margin-bottom:6px;"></h2>
    <p id="resultSub" style="color:var(--muted)"></p>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="sCorrect" style="color:var(--green)"></div><div class="stat-lbl">Correct</div></div>
    <div class="stat-box"><div class="stat-val" id="sWrong" style="color:var(--red)"></div><div class="stat-lbl">Wrong</div></div>
    <div class="stat-box"><div class="stat-val" id="sTime"></div><div class="stat-lbl">Time Taken</div></div>
  </div>

  <h3 class="section-title">Review Answers</h3>
  <div class="review-list" id="reviewList"></div>

  <div class="action-row">
    <button class="btn btn-green" onclick="downloadCertificate()">📄 Download Certificate</button>
    <button class="btn btn-outline" onclick="retakeQuiz()">🔁 Retake Quiz</button>
    <button class="btn btn-outline" onclick="goHome()">🏠 Home</button>
  </div>
</div>

</div><!-- .app -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  QUESTION BANK
// ══════════════════════════════════════════════
const QUESTION_BANK = {

const TOPICS = [
  { key:"JavaScript", icon:"⚡", desc:"ES6+, Closures, Async" },
  { key:"Python",     icon:"🐍", desc:"OOP, Libraries, Syntax" },
  { key:"Web Dev",    icon:"🌐", desc:"HTML, CSS, HTTP, APIs" },
  { key:"General Knowledge", icon:"🌍", desc:"Science, History, Geography" },

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = {
  topic:"", questions:[], currentQ:0, answers:[],
  numQ:10, timePerQ:30, name:"",
  startTime:0, elapsed:0,
  timer:null, timeLeft:0,
};

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  const grid = document.getElementById('topicGrid');
  TOPICS.forEach(t => {
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.innerHTML = `<div class="icon">${t.icon}</div><div class="label">${t.key}</div><div class="count">${t.desc}</div>`;
    div.onclick = () => selectTopic(t.key, div);
    grid.appendChild(div);
  });
}

function selectTopic(key, el) {
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.topic = key;
}

function startQuiz() {
  if (!state.topic) { showToast('Please select a topic first!'); return; }
  state.numQ = parseInt(document.getElementById('numQ').value);
  state.timePerQ = parseInt(document.getElementById('timePerQ').value);
  showScreen('screen-name');
  document.getElementById('userName').focus();
}

function beginQuiz() {
  const name = document.getElementById('userName').value.trim();
  if (!name) { showToast('Please enter your name!'); return; }
  state.name = name;

  // Shuffle and pick questions
  const pool = [...QUESTION_BANK[state.topic]];
  shuffle(pool);
  state.questions = pool.slice(0, state.numQ);
  state.answers = [];
  state.currentQ = 0;
  state.startTime = Date.now();

  showScreen('screen-quiz');
  document.getElementById('qTopic').textContent = state.topic;
  document.getElementById('qTotal').textContent = state.numQ;
  renderQuestion();
}

// ══════════════════════════════════════════════
//  QUIZ LOGIC
// ══════════════════════════════════════════════
function renderQuestion() {
  const idx = state.currentQ;
  const q = state.questions[idx];

  document.getElementById('qNum').textContent = idx + 1;
  document.getElementById('qNumLabel').textContent = `Question ${idx + 1} of ${state.numQ}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((idx / state.numQ) * 100) + '%';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${labels[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    list.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  // next btn
  document.getElementById('nextBtn').style.display = 'none';

  // timer
  clearTimer();
  if (state.timePerQ > 0) {
    const badge = document.getElementById('timerBadge');
    badge.style.display = 'block';
    badge.classList.remove('urgent');
    state.timeLeft = state.timePerQ;
    document.getElementById('timerVal').textContent = state.timeLeft;
    state.timer = setInterval(tickTimer, 1000);
  } else {
    document.getElementById('timerBadge').style.display = 'none';
  }
}

function tickTimer() {
  state.timeLeft--;
  document.getElementById('timerVal').textContent = state.timeLeft;
  const badge = document.getElementById('timerBadge');
  if (state.timeLeft <= 10) badge.classList.add('urgent');
  if (state.timeLeft <= 0) {
    clearTimer();
    autoSkip();
  }
}

function autoSkip() {
  // record no answer
  state.answers.push({ selected: -1, correct: false });
  showFeedback(false, state.questions[state.currentQ].opts[state.questions[state.currentQ].ans]);
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if ([...b.parentElement.children].indexOf(b) === state.questions[state.currentQ].ans) {
      b.classList.add('reveal');
    }
  });
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function selectAnswer(i, btn) {
  clearTimer();
  const q = state.questions[state.currentQ];
  const correct = i === q.ans;
  state.answers.push({ selected: i, correct });

  // disable all
  document.querySelectorAll('.option-btn').forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.ans) b.classList.add('correct');
    else if (idx === i && !correct) b.classList.add('wrong');
  });

  showFeedback(correct, q.opts[q.ans]);
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function showFeedback(correct, correctAns) {
  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar show ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = correct
    ? '✅ Correct! Well done.'
    : `❌ Incorrect. Correct answer: <strong style="margin-left:6px">${correctAns}</strong>`;
}

function nextQuestion() {
  state.currentQ++;
  if (state.currentQ >= state.numQ) {
    showResults();
  } else {
    renderQuestion();
  }
}

function clearTimer() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResults() {
  state.elapsed = Math.round((Date.now() - state.startTime) / 1000);
  clearTimer();

  const correct = state.answers.filter(a => a.correct).length;
  const wrong = state.numQ - correct;
  const pct = Math.round((correct / state.numQ) * 100);

  // grade
  let grade, gradeClass, msg, sub;
  if (pct >= 90) { grade='A+'; gradeClass='grade-A'; msg='Outstanding!'; sub='You aced it! Certificate worthy performance.'; }
  else if (pct >= 80) { grade='A'; gradeClass='grade-A'; msg='Excellent Work!'; sub='Great score! You clearly know your stuff.'; }
  else if (pct >= 70) { grade='B'; gradeClass='grade-B'; msg='Good Job!'; sub='Solid performance. Keep learning!'; }
  else if (pct >= 50) { grade='C'; gradeClass='grade-C'; msg='Not Bad!'; sub='A passing score. Room to improve.'; }
  else { grade='F'; gradeClass='grade-F'; msg='Keep Practicing!'; sub='Review the material and try again.'; }

  // ring color
  const ring = document.getElementById('scoreRing');
  const colors = { 'A+':['#3ecf8e','rgba(62,207,142,0.2)'],'A':['#3ecf8e','rgba(62,207,142,0.2)'],'B':['#5b8dee','rgba(91,141,238,0.2)'],'C':['#f5c842','rgba(245,200,66,0.2)'],'F':['#f06292','rgba(240,98,146,0.15)'] };
  ring.style.borderColor = colors[grade][0];
  ring.style.background = colors[grade][1];
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scorePct').style.color = colors[grade][0];

  const gb = document.getElementById('gradeBadge');
  gb.textContent = `Grade: ${grade}`;
  gb.className = 'grade-badge ' + gradeClass;

  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;

  const mins = Math.floor(state.elapsed/60), secs = state.elapsed%60;
  document.getElementById('sTime').textContent = `${mins}m ${secs}s`;

  // review
  const rl = document.getElementById('reviewList');
  rl.innerHTML = '';
  state.questions.forEach((q, i) => {
    const a = state.answers[i];
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.correct ? 'correct-r' : 'wrong-r');
    const selectedText = a.selected === -1 ? 'No answer (time up)' : q.opts[a.selected];
    div.innerHTML = `
      <div class="review-q">${i+1}. ${q.q}</div>
      <div class="review-answer">
        ${a.correct
          ? `<em class="ok">✅ Your answer: ${selectedText}</em>`
          : `<em class="bad">❌ Your answer: ${selectedText}</em> &nbsp;→&nbsp; <em class="ok">✅ Correct: ${q.opts[q.ans]}</em>`
        }
      </div>`;
    rl.appendChild(div);
  });

  showScreen('screen-result');
  document.getElementById('progressFill').style.width = '100%';
}

// ══════════════════════════════════════════════
//  PDF CERTIFICATE
// ══════════════════════════════════════════════
function downloadCertificate() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const W = 297, H = 210;

  // Background
  doc.setFillColor(10,12,20);
  doc.rect(0,0,W,H,'F');

  // Outer gold border
  doc.setDrawColor(245,200,66);
  doc.setLineWidth(3);
  doc.rect(8,8,W-16,H-16,'S');

  // Inner border
  doc.setLineWidth(0.8);
  doc.setDrawColor(200,150,40);
  doc.rect(12,12,W-24,H-24,'S');

  // Top decorative line
  doc.setLineWidth(1.2);
  doc.setDrawColor(245,200,66);
  doc.line(20,35,W-20,35);
  doc.line(20,36.5,W-20,36.5);

  // Bottom decorative line
  doc.line(20,H-35,W-20,H-35);
  doc.line(20,H-36.5,W-20,H-36.5);

  // Logo / badge text
  doc.setTextColor(245,200,66);
  doc.setFontSize(11);
  doc.setFont('helvetica','bold');
  doc.text('🏆  QUIZMASTER PRO', W/2, 24, {align:'center'});

  // Certificate title
  doc.setTextColor(255,255,255);
  doc.setFontSize(36);
  doc.setFont('times','bold');
  doc.text('Certificate of Achievement', W/2, 55, {align:'center'});

  // Subtitle
  doc.setTextColor(180,190,210);
  doc.setFontSize(13);
  doc.setFont('helvetica','normal');
  doc.text('This is to certify that', W/2, 70, {align:'center'});

  // Name
  doc.setTextColor(245,200,66);
  doc.setFontSize(34);
  doc.setFont('times','bolditalic');
  doc.text(state.name, W/2, 90, {align:'center'});

  // Name underline
  const nameW = doc.getTextWidth(state.name);
  doc.setDrawColor(245,200,66);
  doc.setLineWidth(0.8);
  doc.line(W/2 - nameW/2 - 10, 93, W/2 + nameW/2 + 10, 93);

  // Body text
  const correct = state.answers.filter(a=>a.correct).length;
  const pct = Math.round((correct/state.numQ)*100);

  doc.setTextColor(200,210,225);
  doc.setFontSize(13);
  doc.setFont('helvetica','normal');
  doc.text('has successfully completed the', W/2, 104, {align:'center'});

  doc.setTextColor(91,141,238);
  doc.setFontSize(18);
  doc.setFont('helvetica','bold');
  doc.text(`${state.topic} Quiz`, W/2, 115, {align:'center'});

  doc.setTextColor(200,210,225);
  doc.setFontSize(12);
  doc.setFont('helvetica','normal');
  doc.text(`with a score of ${correct} out of ${state.numQ} questions (${pct}%)`, W/2, 126, {align:'center'});

  // Grade box
  let gradeColor;
  if(pct>=80) gradeColor=[62,207,142];
  else if(pct>=70) gradeColor=[91,141,238];
  else if(pct>=50) gradeColor=[245,200,66];
  else gradeColor=[240,98,146];

  doc.setFillColor(...gradeColor, 30);
  doc.setDrawColor(...gradeColor);
  doc.setLineWidth(1.5);
  doc.roundedRect(W/2-30, 132, 60, 22, 4, 4,'FD');
  doc.setTextColor(...gradeColor);
  doc.setFontSize(15);
  doc.setFont('helvetica','bold');

  let gradeLabel;
  if(pct>=90) gradeLabel='Grade: A+';
  else if(pct>=80) gradeLabel='Grade: A';
  else if(pct>=70) gradeLabel='Grade: B';
  else if(pct>=50) gradeLabel='Grade: C';
  else gradeLabel='Grade: F';

  doc.text(gradeLabel, W/2, 146, {align:'center'});

  // Date and time
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const mins = Math.floor(state.elapsed/60), secs = state.elapsed%60;

  doc.setTextColor(120,130,150);
  doc.setFontSize(10);
  doc.setFont('helvetica','normal');
  doc.text(`Date Issued: ${dateStr}`, 30, H-22);
  doc.text(`Time Taken: ${mins}m ${secs}s`, W/2, H-22, {align:'center'});
  doc.text('QuizMaster Pro – Automated Quiz Engine', W-30, H-22, {align:'right'});

  // Stars decoration
  doc.setTextColor(245,200,66);
  doc.setFontSize(14);
  doc.text('★  ★  ★  ★  ★', W/2, 162, {align:'center'});

  // Save
  const safeName = state.name.replace(/\s+/g,'_');
  doc.save(`Certificate_${safeName}_${state.topic.replace(/\s/g,'_')}.pdf`);
  showToast('📄 Certificate downloaded!');
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function retakeQuiz() {
  clearTimer();
  beginQuiz();
}

function goHome() {
  clearTimer();
  state.topic = '';
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  showScreen('screen-welcome');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Allow Enter key on name input
document.getElementById('userName').addEventListener('keydown', e => {
  if (e.key === 'Enter') beginQuiz();
});

init();
